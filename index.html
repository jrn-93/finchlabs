<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinchLabs | Where the magic happens</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background: #02040d;
      color: white;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .hero {
      min-height: 100vh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 2rem;
    }

    .content {
      animation: float 6s ease-in-out infinite;
    }

    h1 {
      font-size: clamp(4rem, 12vw, 10rem);
      font-weight: 800;
      letter-spacing: -0.08em;
      text-shadow:
        0 0 20px rgba(120, 190, 255, 0.45),
        0 0 60px rgba(80, 140, 255, 0.25);
    }

    .subtitle {
      display: inline-block;
      margin-top: 0.5rem;
      padding: 0.4rem 1.2rem;
      font-size: clamp(1.2rem, 3vw, 2rem);
      font-style: italic;
      letter-spacing: 0.04em;
      color: #d7ecff;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 999px;
      backdrop-filter: blur(10px);
      transform: rotate(-6deg) skewX(-10deg);
      box-shadow: 0 0 30px rgba(130, 180, 255, 0.18);
    }

	.social-links {
	display: flex;
	justify-content: center;
	gap: 1rem;
	margin-top: 1.8rem;
	}

	.social-icon {
	width: 3.2rem;
	height: 3.2rem;
	display: grid;
	place-items: center;
	color: #d7ecff;
	background: rgba(255, 255, 255, 0.08);
	border: 1px solid rgba(255, 255, 255, 0.18);
	border-radius: 50%;
	backdrop-filter: blur(10px);
	box-shadow: 0 0 24px rgba(130, 180, 255, 0.18);
	transition: transform 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
	}

	.social-icon svg {
	width: 1.55rem;
	height: 1.55rem;
	fill: currentColor;
	}

	.social-icon:hover {
	transform: translateY(-4px) scale(1.08);
	background: rgba(255, 255, 255, 0.14);
	box-shadow: 0 0 36px rgba(130, 180, 255, 0.32);
	}

    @keyframes float {
      0%, 100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-14px);
      }
    }
  </style>
</head>

<body>
  <canvas id="space"></canvas>

  <main class="hero">
    <div class="content">
      <h1>FinchLabs</h1>
      <p class="subtitle">Coming soon...</p>
		<div class="social-links">
			<a class="social-icon" href="https://www.linkedin.com/in/jeroen-vink/" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn profile">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
				<path d="M19 3A2 2 0 0 1 21 5V19A2 2 0 0 1 19 21H5A2 2 0 0 1 3 19V5A2 2 0 0 1 5 3H19M18.5 18.5V13.2A3.26 3.26 0 0 0 15.24 9.94C14.39 9.94 13.4 10.46 12.92 11.24V10.13H10.13V18.5H12.92V13.57C12.92 12.8 13.54 12.17 14.31 12.17A1.4 1.4 0 0 1 15.71 13.57V18.5H18.5M6.88 8.56A1.68 1.68 0 0 0 8.56 6.88C8.56 5.95 7.81 5.19 6.88 5.19A1.69 1.69 0 0 0 5.19 6.88C5.19 7.81 5.95 8.56 6.88 8.56M8.27 18.5V10.13H5.5V18.5H8.27Z">
				</svg>
			</a>
			<a class="social-icon" href="mailto:info@finchlabs.eu" aria-label="Mail naar info@finchlabs.eu">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
				<path d="M21,12.13C20.85,12.14 20.71,12.19 20.61,12.3L19.61,13.3L21.66,15.3L22.66,14.3C22.88,14.09 22.88,13.74 22.66,13.53L21.42,12.3C21.32,12.19 21.18,12.14 21.04,12.13M19.04,13.88L13,19.94V22H15.06L21.12,15.93M20,4H4A2,2 0 0,0 2,6V18A2,2 0 0,0 4,20H11V19.11L19.24,10.89C19.71,10.4 20.36,10.13 21.04,10.13C21.38,10.13 21.72,10.19 22.04,10.32V6C22.04,4.88 21.12,4 20,4M20,8L12,13L4,8V6L12,11L20,6">
				</svg>
			</a>
		</div>
    </div>
  </main>

  <script>
    const canvas = document.getElementById("space");
    const ctx = canvas.getContext("2d");

    let width;
    let height;
    let stars = [];
    let angle = 0;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;

      stars = Array.from({ length: 220 }, () => ({
        x: Math.random() * width,
        y: Math.random() * height,
        size: Math.random() * 1.8 + 0.3,
        speed: Math.random() * 0.45 + 0.1,
        glow: Math.random()
      }));
    }

    function drawStars() {
      for (const star of stars) {
        star.x -= star.speed;

        if (star.x < 0) {
          star.x = width;
          star.y = Math.random() * height;
        }

        const twinkle = 0.5 + Math.sin(angle * 2 + star.glow * 10) * 0.35;

        ctx.beginPath();
        ctx.fillStyle = `rgba(255, 255, 255, ${twinkle})`;
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawEarth() {
      const earthRadius = Math.max(width, height) * 0.72;
      const earthX = width / 2 + Math.sin(angle * 0.25) * 80;
      const earthY = height + earthRadius * 0.62;

      const earth = ctx.createRadialGradient(
        earthX,
        earthY - earthRadius * 0.6,
        earthRadius * 0.1,
        earthX,
        earthY,
        earthRadius
      );

      earth.addColorStop(0, "#2ee6ff");
      earth.addColorStop(0.22, "#1167d8");
      earth.addColorStop(0.55, "#052b78");
      earth.addColorStop(1, "#011027");

      ctx.beginPath();
      ctx.fillStyle = earth;
      ctx.arc(earthX, earthY, earthRadius, 0, Math.PI * 2);
      ctx.fill();

      const atmosphere = ctx.createRadialGradient(
        earthX,
        earthY,
        earthRadius * 0.78,
        earthX,
        earthY,
        earthRadius * 1.02
      );

      atmosphere.addColorStop(0, "rgba(80, 190, 255, 0)");
      atmosphere.addColorStop(0.82, "rgba(80, 190, 255, 0)");
      atmosphere.addColorStop(1, "rgba(120, 220, 255, 0.32)");

      ctx.beginPath();
      ctx.fillStyle = atmosphere;
      ctx.arc(earthX, earthY, earthRadius * 1.02, 0, Math.PI * 2);
      ctx.fill();

      drawClouds(earthX, earthY, earthRadius);
      drawCityLights(earthX, earthY, earthRadius);
    }

    function drawClouds(x, y, radius) {
      ctx.strokeStyle = "rgba(255, 255, 255, 0.22)";
      ctx.lineWidth = 2;

      for (let i = 0; i < 7; i++) {
        const offset = angle * 80 + i * 180;
        const cloudY = y - radius * (0.58 + i * 0.035);

        ctx.beginPath();
        ctx.arc(
          x + Math.sin(angle + i) * 80,
          cloudY,
          radius * (0.38 + i * 0.035),
          Math.PI + offset * 0.002,
          Math.PI * 1.35 + offset * 0.002
        );
        ctx.stroke();
      }
    }

    function drawCityLights(x, y, radius) {
      ctx.fillStyle = "rgba(255, 220, 140, 0.75)";

      for (let i = 0; i < 36; i++) {
        const orbit = angle * 0.6 + i * 0.55;
        const px = x + Math.cos(orbit) * radius * 0.46;
        const py = y - radius * 0.58 + Math.sin(orbit * 1.7) * 45;

        ctx.beginPath();
        ctx.arc(px, py, Math.random() * 1.4 + 0.6, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, width, height);

      const space = ctx.createLinearGradient(0, 0, 0, height);
      space.addColorStop(0, "#02040d");
      space.addColorStop(0.5, "#050b1f");
      space.addColorStop(1, "#081536");

      ctx.fillStyle = space;
      ctx.fillRect(0, 0, width, height);

      drawStars();
      drawEarth();

      angle += 0.01;
      requestAnimationFrame(draw);
    }

    window.addEventListener("resize", resize);

    resize();
    draw();
  </script>
</body>
</html>
